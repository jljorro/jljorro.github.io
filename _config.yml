about_content: | # this will include new lines to allow paragraphs
  I am a Ph.D. Student in the Department of Software Engineering and Artificial Intelligence at the Computer Science Faculty at the Complutense University of Madrid.

  My research area is recommender systems. I am working to add contextual information in recommender systems, as location, weather, etc. In addition, I work to apply Case-Based Reasoning (CBR) to resolve some problems in the recommender systems. Now, my research is focused on design and create an intelligent framework to create recommender systems.
